    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:red;color:white;z-index:9999999;padding:20px;font-family:monospace;white-space:pre-wrap;overflow:auto;"><h1>Runtime Error!</h1><p>' + message + '</p><p>' + (error ? error.stack : '') + '</p></div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:red;color:white;z-index:9999999;padding:20px;font-family:monospace;white-space:pre-wrap;overflow:auto;"><h1>Unhandled Promise Rejection!</h1><p>' + event.reason + '</p></div>';
      });
    </script>
